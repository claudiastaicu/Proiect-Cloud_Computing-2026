<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineSearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1a1a24;
      --border: #2a2a3a;
      --accent: #e8b94f;
      --accent2: #e85f4f;
      --text: #f0f0f5;
      --muted: #888899;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

    /* AUTH */
    #authScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, var(--bg) 70%);
    }
    .auth-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 2.5rem 2rem;
      width: 100%; max-width: 380px; text-align: center;
    }
    .auth-logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 4px; color: var(--accent); margin-bottom: 0.25rem; }
    .auth-logo span { color: var(--accent2); }
    .auth-subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 2rem; }
    .auth-tabs { display: flex; background: var(--surface); border-radius: 10px; padding: 4px; margin-bottom: 1.5rem; }
    .auth-tab { flex: 1; padding: 0.5rem; border: none; background: transparent; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
    .auth-tab.active { background: var(--accent); color: #000; }
    .auth-input { width: 100%; padding: 0.75rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem; margin-bottom: 0.75rem; outline: none; transition: border-color 0.2s; }
    .auth-input:focus { border-color: var(--accent); }
    .auth-btn { width: 100%; padding: 0.8rem; background: var(--accent); border: none; border-radius: 10px; color: #000; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.95rem; cursor: pointer; margin-top: 0.25rem; transition: background 0.2s; }
    .auth-btn:hover { background: #f5ca6a; }
    .auth-error { color: var(--accent2); font-size: 0.8rem; margin-top: 0.75rem; min-height: 1rem; }

    /* APP */
    #appScreen { display: none; }
    header {
      background: linear-gradient(180deg, #000 0%, transparent 100%);
      padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem;
      position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); flex-wrap: wrap;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 3px; color: var(--accent); }
    .logo span { color: var(--accent2); }
    .search-wrapper { flex: 1; min-width: 200px; max-width: 500px; position: relative; }
    .search-wrapper input { width: 100%; padding: 0.7rem 1rem 0.7rem 2.8rem; background: var(--surface); border: 1px solid var(--border); border-radius: 50px; color: var(--text); font-size: 0.9rem; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
    .search-wrapper input:focus { border-color: var(--accent); }
    .search-icon { position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%); color: var(--muted); }
    .search-wrapper button { position: absolute; right: 0.35rem; top: 50%; transform: translateY(-50%); background: var(--accent); color: #000; border: none; border-radius: 50px; padding: 0.4rem 1rem; font-weight: 600; font-family: 'Inter', sans-serif; font-size: 0.82rem; cursor: pointer; }
    .search-wrapper button:hover { background: #f5ca6a; }
    .header-right { display: flex; align-items: center; gap: 0.75rem; margin-left: auto; }
    .user-badge { background: var(--surface); border: 1px solid var(--border); border-radius: 50px; padding: 0.4rem 0.9rem; font-size: 0.8rem; color: var(--muted); }
    .user-badge strong { color: var(--accent); }
    .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 50px; padding: 0.4rem 0.9rem; font-size: 0.8rem; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s; }
    .logout-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    .nav-tabs { display: flex; gap: 0.5rem; padding: 0.75rem 2rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .nav-tab { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 50px; padding: 0.4rem 1rem; font-size: 0.82rem; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s; }
    .nav-tab.active, .nav-tab:hover { border-color: var(--accent); color: var(--accent); }
    .nav-tab.add-btn { border-color: var(--accent2); color: var(--accent2); }
    .nav-tab.add-btn:hover { background: var(--accent2); color: #fff; }

    main { padding: 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 3px; color: var(--muted); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.75rem; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 1.25rem; }

    .card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid var(--border); transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; position: relative; }
    .card:hover { transform: translateY(-4px) scale(1.02); border-color: var(--accent); box-shadow: 0 8px 30px rgba(232,185,79,0.15); }
    .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
    .card-no-img { width: 100%; aspect-ratio: 2/3; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
    .card-info { padding: 0.7rem; }
    .card-title { font-size: 0.82rem; font-weight: 600; margin-bottom: 0.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { font-size: 0.72rem; color: var(--muted); display: flex; align-items: center; justify-content: space-between; }
    .rating { color: var(--accent); font-weight: 600; }
    .fav-btn { position: absolute; top: 0.5rem; right: 0.5rem; background: rgba(0,0,0,0.65); border: none; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; cursor: pointer; transition: transform 0.2s; z-index: 2; }
    .fav-btn:hover { transform: scale(1.2); }
    .delete-card-btn { position: absolute; top: 0.5rem; left: 0.5rem; background: rgba(232,95,79,0.8); border: none; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; cursor: pointer; color: white; z-index: 2; transition: background 0.2s; }
    .delete-card-btn:hover { background: var(--accent2); }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 20px; max-width: 750px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; animation: modalIn 0.25s ease; }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: rgba(0,0,0,0.5); border: none; color: var(--text); width: 36px; height: 36px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; transition: background 0.2s; }
    .modal-close:hover { background: var(--accent2); }
    .modal-backdrop { width: 100%; height: 200px; object-fit: cover; object-position: top; border-radius: 20px 20px 0 0; display: block; }
    .modal-backdrop-placeholder { width: 100%; height: 200px; background: linear-gradient(135deg, var(--surface), var(--border)); border-radius: 20px 20px 0 0; display: flex; align-items: center; justify-content: center; font-size: 4rem; }
    .modal-body { padding: 1.5rem; }
    .modal-header { display: flex; gap: 1.25rem; margin-bottom: 1.25rem; }
    .modal-poster { width: 100px; flex-shrink: 0; border-radius: 10px; overflow: hidden; border: 2px solid var(--border); }
    .modal-poster img { width: 100%; display: block; }
    .modal-poster-placeholder { width: 100px; aspect-ratio: 2/3; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    .modal-title-area h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 0.4rem; }
    .modal-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.6rem; }
    .tag { background: var(--surface); border: 1px solid var(--border); border-radius: 50px; padding: 0.2rem 0.7rem; font-size: 0.75rem; color: var(--muted); }
    .modal-stats { display: flex; gap: 1.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--accent); }
    .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .modal-plot { font-size: 0.9rem; color: var(--muted); line-height: 1.7; margin-bottom: 1rem; border-left: 3px solid var(--accent); padding-left: 1rem; }
    .modal-detail-row { display: flex; gap: 0.5rem; font-size: 0.85rem; margin-bottom: 0.4rem; }
    .modal-detail-label { color: var(--muted); min-width: 80px; }
    .modal-fav-btn { margin-top: 1.25rem; padding: 0.6rem 1.5rem; background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 50px; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .modal-fav-btn:hover, .modal-fav-btn.active { background: var(--accent); color: #000; }

    /* ADD FILM MODAL */
    .add-modal { max-width: 480px; }
    .add-modal-header { padding: 1.5rem 1.5rem 0; }
    .add-modal-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 0.25rem; }
    .add-modal-header p { color: var(--muted); font-size: 0.82rem; margin-bottom: 1.25rem; }
    .add-form { padding: 0 1.5rem 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .add-input, .add-textarea { width: 100%; padding: 0.75rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; resize: vertical; }
    .add-input:focus, .add-textarea:focus { border-color: var(--accent); }
    .add-textarea { min-height: 90px; }
    .add-label { font-size: 0.78rem; color: var(--muted); margin-bottom: -0.4rem; }
    .add-submit-btn { padding: 0.8rem; background: var(--accent2); border: none; border-radius: 10px; color: #fff; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; margin-top: 0.25rem; }
    .add-submit-btn:hover { background: #f07060; }
    .add-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .add-error { color: var(--accent2); font-size: 0.8rem; text-align: center; }
    .add-success { color: #4caf7d; font-size: 0.8rem; text-align: center; }

    /* CUSTOM CARD badge */
    .custom-badge { position: absolute; bottom: 3.2rem; left: 0; right: 0; background: rgba(232,95,79,0.85); color: #fff; font-size: 0.65rem; font-weight: 600; text-align: center; padding: 2px 0; letter-spacing: 1px; }

    .loader { display: none; text-align: center; padding: 3rem; color: var(--muted); }
    .loader.active { display: block; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">Cine<span>Search</span></div>
    <p class="auth-subtitle">Descoperă filme și salvează-ți favoritele</p>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Autentificare</button>
      <button class="auth-tab" onclick="switchTab('register')">Înregistrare</button>
    </div>
    <div id="loginForm">
      <input class="auth-input" type="text" id="loginUser" placeholder="Utilizator" />
      <input class="auth-input" type="password" id="loginPass" placeholder="Parolă" />
      <button class="auth-btn" onclick="login()">Intră în cont</button>
    </div>
    <div id="registerForm" style="display:none">
      <input class="auth-input" type="text" id="regUser" placeholder="Utilizator" />
      <input class="auth-input" type="password" id="regPass" placeholder="Parolă" />
      <input class="auth-input" type="password" id="regPass2" placeholder="Confirmă parola" />
      <button class="auth-btn" onclick="register()">Creează cont</button>
    </div>
    <p class="auth-error" id="authError"></p>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <header>
    <div class="logo">Cine<span>Search</span></div>
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Caută un film..." onkeydown="if(event.key==='Enter') searchMovies()" />
      <button onclick="searchMovies()">Caută</button>
    </div>
    <div class="header-right">
      <div class="user-badge">👤 <strong id="userDisplay"></strong></div>
      <button class="logout-btn" onclick="logout()">Deconectare</button>
    </div>
  </header>

  <div class="nav-tabs">
    <button class="nav-tab active" id="tabTrending" onclick="showTab('trending')">🔥 Trending</button>
    <button class="nav-tab" id="tabFavorites" onclick="showTab('favorites')">⭐ Favorite</button>
    <button class="nav-tab" id="tabCustom" onclick="showTab('custom')">📋 Lista mea</button>
    <button class="nav-tab add-btn" onclick="openAddModal()">＋ Adaugă film</button>
  </div>

  <main>
    <div class="loader" id="loader"><div class="spinner"></div><p>Se încarcă...</p></div>

    <div id="resultsSection" style="display:none">
      <div class="section-title" id="resultsTitle">Rezultate</div>
      <div class="grid" id="resultsGrid"></div>
    </div>
    <div id="trendingSection">
      <div class="section-title">Tendințe acum</div>
      <div class="grid" id="trendingGrid"></div>
    </div>
    <div id="favoritesSection" style="display:none">
      <div class="section-title">Favoritele tale</div>
      <div class="grid" id="favoritesGrid"></div>
    </div>
    <div id="customSection" style="display:none">
      <div class="section-title">Lista mea de filme</div>
      <div class="grid" id="customGrid"></div>
    </div>
  </main>
</div>

<!-- FILM DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- ADD FILM MODAL -->
<div class="modal-overlay" id="addModalOverlay" onclick="closeAddModal(event)">
  <div class="modal add-modal">
    <button class="modal-close" onclick="closeAddModal()">✕</button>
    <div class="add-modal-header">
      <h2>➕ Adaugă Film</h2>
      <p>Filmul va fi salvat în lista ta personală pe server (POST → JSONBin)</p>
    </div>
    <div class="add-form">
      <label class="add-label">Titlu *</label>
      <input class="add-input" type="text" id="addTitle" placeholder="ex: Inception" />
      <label class="add-label">An</label>
      <input class="add-input" type="text" id="addYear" placeholder="ex: 2010" />
      <label class="add-label">Gen</label>
      <input class="add-input" type="text" id="addGenre" placeholder="ex: Sci-Fi, Thriller" />
      <label class="add-label">Rating (1-10)</label>
      <input class="add-input" type="number" id="addRating" placeholder="ex: 9" min="1" max="10" />
      <label class="add-label">Descriere</label>
      <textarea class="add-textarea" id="addDesc" placeholder="Descrierea filmului..."></textarea>
      <button class="add-submit-btn" id="addSubmitBtn" onclick="addCustomFilm()">💾 Salvează pe server</button>
      <p id="addMsg" style="display:none"></p>
    </div>
  </div>
</div>

<script>
  const TMDB_KEY  = '8bbd77348419af48a30565ec31a6f20b';
  const OMDB_KEY  = '45df9f6a';
  const JSONBIN_KEY = '$2a$10$CDiWeG.xd23Y98J6wtgFZeG33UzTEoP/Lx1x.ROaSkM.hdTenw.dq';
  const JSONBIN_URL = 'https://api.jsonbin.io/v3/b';

  const TMDB   = 'https://api.themoviedb.org/3';
  const IMG    = 'https://image.tmdb.org/t/p/w500';
  const IMG_BG = 'https://image.tmdb.org/t/p/w1280';

  let currentUser = null;

  // ── STORAGE ──────────────────────────────────────
  function getUsers()    { return JSON.parse(localStorage.getItem('cs_users') || '{}'); }
  function saveUsers(u)  { localStorage.setItem('cs_users', JSON.stringify(u)); }
  function getFavorites(){ return JSON.parse(localStorage.getItem('cs_favs_' + currentUser) || '[]'); }
  function saveFavorites(f){ localStorage.setItem('cs_favs_' + currentUser, JSON.stringify(f)); }

  // JSONBin bin ID per user
  function getBinId()    { return localStorage.getItem('cs_bin_' + currentUser); }
  function saveBinId(id) { localStorage.setItem('cs_bin_' + currentUser, id); }

  // ── AUTH ─────────────────────────────────────────
  function switchTab(tab) {
    document.getElementById('loginForm').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', i === (tab==='login'?0:1)));
    document.getElementById('authError').textContent = '';
  }

  function login() {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value;
    const users = getUsers();
    if (!user || !pass) { showAuthError('Completează toate câmpurile.'); return; }
    if (!users[user] || users[user] !== pass) { showAuthError('Utilizator sau parolă greșite.'); return; }
    startSession(user);
  }

  function register() {
    const user  = document.getElementById('regUser').value.trim();
    const pass  = document.getElementById('regPass').value;
    const pass2 = document.getElementById('regPass2').value;
    const users = getUsers();
    if (!user || !pass) { showAuthError('Completează toate câmpurile.'); return; }
    if (pass !== pass2) { showAuthError('Parolele nu coincid.'); return; }
    if (users[user])    { showAuthError('Utilizatorul există deja.'); return; }
    if (pass.length < 4){ showAuthError('Parola trebuie să aibă minim 4 caractere.'); return; }
    users[user] = pass;
    saveUsers(users);
    startSession(user);
  }

  function startSession(user) {
    currentUser = user;
    localStorage.setItem('cs_session', user);
    document.getElementById('userDisplay').textContent = user;
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display  = 'block';
    loadTrending();
  }

  function logout() {
    localStorage.removeItem('cs_session');
    currentUser = null;
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display  = 'none';
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
  }

  function showAuthError(msg) { document.getElementById('authError').textContent = msg; }

  // Persistență sesiune după refresh
  window.addEventListener('load', () => {
    const saved = localStorage.getItem('cs_session');
    if (saved && getUsers()[saved]) startSession(saved);
  });

  // ── TABS ─────────────────────────────────────────
  function showTab(tab) {
    ['trending','favorites','custom'].forEach(t => {
      document.getElementById(t+'Section').style.display = t === tab ? 'block' : 'none';
    });
    document.getElementById('resultsSection').style.display = 'none';
    document.getElementById('tabTrending').classList.toggle('active', tab==='trending');
    document.getElementById('tabFavorites').classList.toggle('active', tab==='favorites');
    document.getElementById('tabCustom').classList.toggle('active', tab==='custom');
    if (tab === 'favorites') renderFavorites();
    if (tab === 'custom')    loadCustomFilms();
  }

  // ── TRENDING ─────────────────────────────────────
  async function loadTrending() {
    try {
      const res  = await fetch(`${TMDB}/trending/movie/week?api_key=${TMDB_KEY}&language=ro-RO`);
      const data = await res.json();
      renderGrid(data.results || [], 'trendingGrid');
    } catch(e) {
      document.getElementById('trendingGrid').innerHTML = '<p style="color:var(--accent2)">Eroare. Verifică cheile API.</p>';
    }
  }

  // ── SEARCH ───────────────────────────────────────
  async function searchMovies() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;
    ['trendingSection','favoritesSection','customSection'].forEach(id => document.getElementById(id).style.display = 'none');
    document.getElementById('resultsSection').style.display = 'none';
    document.getElementById('loader').classList.add('active');
    ['tabTrending','tabFavorites','tabCustom'].forEach(id => document.getElementById(id).classList.remove('active'));
    document.getElementById('tabTrending').classList.add('active');
    try {
      const res  = await fetch(`${TMDB}/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&language=ro-RO`);
      const data = await res.json();
      document.getElementById('loader').classList.remove('active');
      document.getElementById('resultsTitle').textContent = `Rezultate pentru "${query}" (${data.total_results||0})`;
      document.getElementById('resultsSection').style.display = 'block';
      renderGrid(data.results || [], 'resultsGrid');
    } catch(e) {
      document.getElementById('loader').classList.remove('active');
      document.getElementById('resultsGrid').innerHTML = '<p style="color:var(--accent2)">Eroare la căutare.</p>';
      document.getElementById('resultsSection').style.display = 'block';
    }
  }

  // ── FAVORITES ────────────────────────────────────
  function isFav(id) { return getFavorites().some(f => f.id === id); }

  function toggleFav(movie, event) {
    if (event) event.stopPropagation();
    let favs = getFavorites();
    if (isFav(movie.id)) { favs = favs.filter(f => f.id !== movie.id); }
    else { favs.push({id:movie.id,title:movie.title,poster_path:movie.poster_path,vote_average:movie.vote_average,release_date:movie.release_date}); }
    saveFavorites(favs);
    const btn = document.getElementById('modalFavBtn');
    if (btn) { btn.textContent = isFav(movie.id) ? '⭐ Salvat la favorite' : '☆ Adaugă la favorite'; btn.classList.toggle('active', isFav(movie.id)); }
    document.querySelectorAll(`.fav-btn[data-id="${movie.id}"]`).forEach(b => b.textContent = isFav(movie.id) ? '⭐' : '☆');
    if (document.getElementById('favoritesSection').style.display !== 'none') renderFavorites();
  }

  function renderFavorites() {
    const favs = getFavorites();
    if (!favs.length) {
      document.getElementById('favoritesGrid').innerHTML = '<div class="empty"><div class="empty-icon">⭐</div><p>Nu ai filme favorite încă.<br>Apasă ☆ pe orice film!</p></div>';
      return;
    }
    renderGrid(favs, 'favoritesGrid');
  }

  // ── JSONBIN — LISTA PERSONALĂ ─────────────────────
  async function getOrCreateBin() {
    let binId = getBinId();
    if (binId) return binId;
    // POST — creează un bin nou pentru acest utilizator
    const res = await fetch(JSONBIN_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_KEY,
        'X-Bin-Name': 'cinesearch_' + currentUser,
        'X-Bin-Private': 'false'
      },
      body: JSON.stringify({ films: [] })
    });
    const data = await res.json();
    binId = data.metadata.id;
    saveBinId(binId);
    return binId;
  }

  async function loadCustomFilms() {
    const grid = document.getElementById('customGrid');
    grid.innerHTML = '<div class="loader active" style="display:block"><div class="spinner"></div><p>Se încarcă lista...</p></div>';
    try {
      const binId = await getOrCreateBin();
      // GET — citește bin-ul
      const res  = await fetch(`${JSONBIN_URL}/${binId}/latest`, {
        headers: { 'X-Master-Key': JSONBIN_KEY }
      });
      const data = await res.json();
      const films = data.record?.films || [];
      if (!films.length) {
        grid.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>Lista ta e goală.<br>Apasă <b>＋ Adaugă film</b> pentru a adăuga!</p></div>';
        return;
      }
      renderCustomGrid(films);
    } catch(e) {
      grid.innerHTML = '<p style="color:var(--accent2);padding:2rem">Eroare la încărcarea listei.</p>';
    }
  }

  function renderCustomGrid(films) {
    const grid = document.getElementById('customGrid');
    grid.innerHTML = films.map((f, idx) => `
      <div class="card" onclick="openCustomModal(${idx})">
        <button class="delete-card-btn" onclick="deleteCustomFilm(${idx}, event)" title="Șterge">🗑</button>
        <div class="card-no-img">🎬</div>
        <div class="custom-badge">ADĂUGAT DE MINE</div>
        <div class="card-info">
          <div class="card-title">${f.title}</div>
          <div class="card-meta">
            <span class="rating">★ ${f.rating || '—'}</span>
            <span>${f.year || '—'}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  async function addCustomFilm() {
    const title  = document.getElementById('addTitle').value.trim();
    const year   = document.getElementById('addYear').value.trim();
    const genre  = document.getElementById('addGenre').value.trim();
    const rating = document.getElementById('addRating').value.trim();
    const desc   = document.getElementById('addDesc').value.trim();

    if (!title) { showAddMsg('Titlul este obligatoriu!', false); return; }

    const btn = document.getElementById('addSubmitBtn');
    btn.disabled = true;
    btn.textContent = 'Se salvează...';

    try {
      const binId = await getOrCreateBin();
      // GET — citim lista curentă
      const getRes  = await fetch(`${JSONBIN_URL}/${binId}/latest`, { headers: { 'X-Master-Key': JSONBIN_KEY } });
      const getData = await getRes.json();
      const films   = getData.record?.films || [];

      // Adăugăm filmul nou
      films.push({ title, year, genre, rating, desc, addedBy: currentUser, addedAt: new Date().toISOString() });

      // PUT — salvăm lista actualizată (JSONBin folosește PUT pentru update)
      await fetch(`${JSONBIN_URL}/${binId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
        body: JSON.stringify({ films })
      });

      showAddMsg('✅ Film salvat cu succes pe server!', true);
      document.getElementById('addTitle').value  = '';
      document.getElementById('addYear').value   = '';
      document.getElementById('addGenre').value  = '';
      document.getElementById('addRating').value = '';
      document.getElementById('addDesc').value   = '';

      setTimeout(() => { closeAddModal(); showTab('custom'); }, 1200);
    } catch(e) {
      showAddMsg('❌ Eroare la salvare. Încearcă din nou.', false);
    } finally {
      btn.disabled = false;
      btn.textContent = '💾 Salvează pe server';
    }
  }

  async function deleteCustomFilm(idx, event) {
    if (event) event.stopPropagation();
    if (!confirm('Sigur vrei să ștergi acest film?')) return;
    try {
      const binId  = await getOrCreateBin();
      const getRes = await fetch(`${JSONBIN_URL}/${binId}/latest`, { headers: { 'X-Master-Key': JSONBIN_KEY } });
      const getData= await getRes.json();
      const films  = getData.record?.films || [];
      films.splice(idx, 1);
      // PUT cu lista fără filmul șters
      await fetch(`${JSONBIN_URL}/${binId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
        body: JSON.stringify({ films })
      });
      loadCustomFilms();
    } catch(e) {
      alert('Eroare la ștergere.');
    }
  }

  function showAddMsg(msg, success) {
    const el = document.getElementById('addMsg');
    el.textContent = msg;
    el.style.display = 'block';
    el.className = success ? 'add-success' : 'add-error';
  }

  // ── ADD MODAL ────────────────────────────────────
  function openAddModal() {
    document.getElementById('addModalOverlay').classList.add('active');
    document.getElementById('addMsg').style.display = 'none';
  }

  function closeAddModal(event) {
    if (!event || event.target === document.getElementById('addModalOverlay'))
      document.getElementById('addModalOverlay').classList.remove('active');
  }

  // ── CUSTOM FILM MODAL ────────────────────────────
  async function openCustomModal(idx) {
    document.getElementById('modalOverlay').classList.add('active');
    document.getElementById('modalContent').innerHTML = '<div style="padding:3rem;text-align:center"><div class="spinner" style="margin:auto"></div></div>';
    const binId  = await getOrCreateBin();
    const getRes = await fetch(`${JSONBIN_URL}/${binId}/latest`, { headers: { 'X-Master-Key': JSONBIN_KEY } });
    const getData= await getRes.json();
    const f      = (getData.record?.films || [])[idx];
    if (!f) { closeModal(); return; }
    document.getElementById('modalContent').innerHTML = `
      <div class="modal-backdrop-placeholder">🎬</div>
      <div class="modal-body">
        <div class="modal-header">
          <div class="modal-poster"><div class="modal-poster-placeholder">🎬</div></div>
          <div class="modal-title-area">
            <h2>${f.title}</h2>
            <div class="modal-tags">
              ${f.genre ? f.genre.split(',').map(g => `<span class="tag">${g.trim()}</span>`).join('') : ''}
              <span class="tag" style="border-color:var(--accent2);color:var(--accent2)">Adăugat de mine</span>
            </div>
          </div>
        </div>
        <div class="modal-stats">
          ${f.rating ? `<div class="stat"><div class="stat-value">★ ${f.rating}</div><div class="stat-label">Rating meu</div></div>` : ''}
          ${f.year   ? `<div class="stat"><div class="stat-value">${f.year}</div><div class="stat-label">An</div></div>` : ''}
        </div>
        ${f.desc ? `<p class="modal-plot">${f.desc}</p>` : ''}
        <div class="modal-detail-row"><span class="modal-detail-label">Adăugat de</span><span>${f.addedBy}</span></div>
        <div class="modal-detail-row"><span class="modal-detail-label">Data</span><span>${new Date(f.addedAt).toLocaleDateString('ro-RO')}</span></div>
        <button class="modal-fav-btn" style="border-color:var(--accent2);color:var(--accent2)" onclick="deleteCustomFilm(${idx});closeModal()">🗑 Șterge din lista mea</button>
      </div>`;
  }

  // ── TMDB GRID ────────────────────────────────────
  function renderGrid(movies, gridId) {
    const grid = document.getElementById(gridId);
    if (!movies.length) { grid.innerHTML = '<div class="empty"><div class="empty-icon">🎬</div><p>Niciun film găsit.</p></div>'; return; }
    grid.innerHTML = movies.map(m => {
      const mJson = JSON.stringify({id:m.id,title:m.title,poster_path:m.poster_path,vote_average:m.vote_average,release_date:m.release_date}).replace(/"/g,'&quot;');
      return `
        <div class="card" onclick="openModal(${m.id})">
          <button class="fav-btn" data-id="${m.id}" onclick="toggleFav(JSON.parse(this.dataset.movie),event)" data-movie="${mJson}">${isFav(m.id)?'⭐':'☆'}</button>
          ${m.poster_path ? `<img src="${IMG}${m.poster_path}" alt="${m.title}" loading="lazy"/>` : `<div class="card-no-img">🎬</div>`}
          <div class="card-info">
            <div class="card-title">${m.title}</div>
            <div class="card-meta">
              <span class="rating">★ ${m.vote_average?Number(m.vote_average).toFixed(1):'N/A'}</span>
              <span>${m.release_date?m.release_date.slice(0,4):'—'}</span>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // ── TMDB MODAL ───────────────────────────────────
  async function openModal(id) {
    document.getElementById('modalOverlay').classList.add('active');
    document.getElementById('modalContent').innerHTML = '<div style="padding:3rem;text-align:center"><div class="spinner" style="margin:auto"></div></div>';
    try {
      const [detailRes, creditsRes] = await Promise.all([
        fetch(`${TMDB}/movie/${id}?api_key=${TMDB_KEY}&language=ro-RO`),
        fetch(`${TMDB}/movie/${id}/credits?api_key=${TMDB_KEY}`)
      ]);
      const movie   = await detailRes.json();
      const credits = await creditsRes.json();
      let omdb = {};
      if (movie.imdb_id) {
        try { omdb = await (await fetch(`https://www.omdbapi.com/?i=${movie.imdb_id}&apikey=${OMDB_KEY}`)).json(); } catch(e) {}
      }
      const director       = credits.crew?.find(c => c.job==='Director');
      const cast           = credits.cast?.slice(0,4).map(a=>a.name).join(', ') || '—';
      const genres         = movie.genres?.map(g=>`<span class="tag">${g.name}</span>`).join('') || '';
      const imdbRating     = omdb.imdbRating && omdb.imdbRating!=='N/A' ? omdb.imdbRating : null;
      const rottenTomatoes = omdb.Ratings?.find(r=>r.Source==='Rotten Tomatoes');
      const favMovie = {id:movie.id,title:movie.title,poster_path:movie.poster_path,vote_average:movie.vote_average,release_date:movie.release_date};
      const favJson  = JSON.stringify(favMovie).replace(/"/g,'&quot;');
      document.getElementById('modalContent').innerHTML = `
        ${movie.backdrop_path ? `<img class="modal-backdrop" src="${IMG_BG}${movie.backdrop_path}" alt=""/>` : `<div class="modal-backdrop-placeholder">🎬</div>`}
        <div class="modal-body">
          <div class="modal-header">
            <div class="modal-poster">${movie.poster_path?`<img src="${IMG}${movie.poster_path}" alt="${movie.title}"/>`:`<div class="modal-poster-placeholder">🎬</div>`}</div>
            <div class="modal-title-area">
              <h2>${movie.title}</h2>
              ${movie.tagline?`<p style="color:var(--accent);font-style:italic;font-size:0.85rem;margin-bottom:0.5rem">"${movie.tagline}"</p>`:''}
              <div class="modal-tags">${genres}</div>
            </div>
          </div>
          <div class="modal-stats">
            <div class="stat"><div class="stat-value">★ ${movie.vote_average?.toFixed(1)||'N/A'}</div><div class="stat-label">TMDB</div></div>
            ${imdbRating?`<div class="stat"><div class="stat-value">${imdbRating}</div><div class="stat-label">IMDb</div></div>`:''}
            ${rottenTomatoes?`<div class="stat"><div class="stat-value">${rottenTomatoes.Value}</div><div class="stat-label">Rotten Tomatoes</div></div>`:''}
            ${movie.runtime?`<div class="stat"><div class="stat-value">${movie.runtime}'</div><div class="stat-label">Durată</div></div>`:''}
            ${movie.vote_count?`<div class="stat"><div class="stat-value">${movie.vote_count.toLocaleString()}</div><div class="stat-label">Voturi</div></div>`:''}
          </div>
          ${(omdb.Plot&&omdb.Plot!=='N/A')?`<p class="modal-plot">${omdb.Plot}</p>`:movie.overview?`<p class="modal-plot">${movie.overview}</p>`:''}
          <div class="modal-detail-row"><span class="modal-detail-label">Lansare</span><span>${movie.release_date||'—'}</span></div>
          ${director?`<div class="modal-detail-row"><span class="modal-detail-label">Regizor</span><span>${director.name}</span></div>`:''}
          <div class="modal-detail-row"><span class="modal-detail-label">Actori</span><span>${cast}</span></div>
          ${omdb.Country?`<div class="modal-detail-row"><span class="modal-detail-label">Țară</span><span>${omdb.Country}</span></div>`:''}
          ${movie.budget>0?`<div class="modal-detail-row"><span class="modal-detail-label">Buget</span><span>$${movie.budget.toLocaleString()}</span></div>`:''}
          ${movie.revenue>0?`<div class="modal-detail-row"><span class="modal-detail-label">Încasări</span><span>$${movie.revenue.toLocaleString()}</span></div>`:''}
          <button id="modalFavBtn" class="modal-fav-btn ${isFav(movie.id)?'active':''}" onclick="toggleFav(JSON.parse(this.dataset.movie))" data-movie="${favJson}">
            ${isFav(movie.id)?'⭐ Salvat la favorite':'☆ Adaugă la favorite'}
          </button>
        </div>`;
    } catch(e) {
      document.getElementById('modalContent').innerHTML = '<div style="padding:2rem;color:var(--accent2)">Eroare la încărcarea detaliilor.</div>';
    }
  }

  function closeModal(event) {
    if (!event || event.target===document.getElementById('modalOverlay'))
      document.getElementById('modalOverlay').classList.remove('active');
  }
</script>
</body>
